name: Daily Twessie Content Generation

on:
  schedule:
    # Run every day at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run daily content generator
        run: |
          python scripts/daily_content_generator.py
      
      - name: Configure Git
        run: |
          git config --local user.email "bot@twessie.ai"
          git config --local user.name "Twessie Content Bot"
      
      - name: Commit and push generated content
        run: |
          git add output/
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "🎨 Daily content generation: $(date +'%Y-%m-%d')"
            git push
          fi
      
      - name: Generate workflow summary
        run: |
          LATEST_DATE=$(ls -td output/*/ | head -1 | xargs basename)
          COUNT=$(find output/$LATEST_DATE -name "*.json" | wc -l)
          echo "## ✨ Content Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $LATEST_DATE" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Assets**: $COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Groups**: 5" >> $GITHUB_STEP_SUMMARY
          echo "- **SKUs per Group**: 10" >> $GITHUB_STEP_SUMMARY
