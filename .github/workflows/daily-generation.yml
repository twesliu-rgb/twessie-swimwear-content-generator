name: Daily Twessie Content Generation

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Shopify product generator
        run: |
          python scripts/shopify_product_generator.py
      
      - name: Generate Shopify HTML preview
        run: |
          python scripts/generate_shopify_html.py
      
      - name: Configure Git
        run: |
          git config --local user.email "bot@twessie.ai"
          git config --local user.name "Twessie Content Bot"
      
      - name: Commit and push generated content
        run: |
          git add output/
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "🎨 Daily content generation: $(date +'%Y-%m-%d')"
            git push
          fi
